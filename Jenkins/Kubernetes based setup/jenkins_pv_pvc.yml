apiVersion: v1
kind: PersistentVolume
metadata:
  name: jenkins-pv         
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: standard  # ← Added
  hostPath:
    path: /data/jenkins
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-pvc
  namespace: jenkins
spec:
  volumeName: jenkins-pv
  accessModes:
    - ReadWriteOnce
  storageClassName: standard  # ← Added (must match PV)
  resources:
    requests:
      storage: 10Gi