# -------------------------------------------------------
# IRSA — ServiceAccount bound to IAM Role
# The IAM role must have a policy allowing:
#   secretsmanager:GetSecretValue on your RDS secret ARN
# -------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  annotations:
    # Replace with your actual IAM role ARN after running eksctl + IRSA setup
    eks.amazonaws.com/role-arn: arn:aws:iam::169976490560:role/eksctl-task-cluster-addon-iamserviceaccount-t-Role1-iNjE4Z3FqtgI

---
# -------------------------------------------------------
# Kubernetes Secret — populated by External Secrets Operator
# pulling from AWS Secrets Manager.
# You do NOT create this manually — ESO syncs it.
# Shown here as reference for what keys the backend expects.
# -------------------------------------------------------
# apiVersion: v1
# kind: Secret
# metadata:
#   name: rds-secret
# type: Opaque
# data:
#   host: <base64 of RDS endpoint>
#   port: <base64 of "5432">
#   dbname: <base64 of DB name>
#   username: <base64 of username>
#   password: <base64 of password>

---
# -------------------------------------------------------
# ExternalSecret — tells ESO to pull from Secrets Manager
# Install ESO first: https://external-secrets.io
# -------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rds-external-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rds-secret           # this is what the Deployment references
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: prod/taskmanager/rds    # your Secrets Manager secret name
        property: host
    - secretKey: port
      remoteRef:
        key: prod/taskmanager/rds
        property: port
    - secretKey: dbname
      remoteRef:
        key: prod/taskmanager/rds
        property: dbname
    - secretKey: username
      remoteRef:
        key: prod/taskmanager/rds
        property: username
    - secretKey: password
      remoteRef:
        key: prod/taskmanager/rds
        property: password