# otel-collector-values.yaml
image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.88.0"

mode: daemonset

presets:
  kubernetesAttributes:
    enabled: false  # ← disable this

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      send_batch_size: 512
      timeout: 5s

  exporters:
    otlp:
      endpoint: jaeger.traces.svc.cluster.local:4317
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi