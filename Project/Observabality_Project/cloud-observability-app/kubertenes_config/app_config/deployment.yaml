apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-demo-app
  namespace: app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: observability-demo-app

  template:
    metadata:
      labels:
        app: observability-demo-app

    spec:
      containers:
        - name: app
          image: 169976490560.dkr.ecr.us-east-1.amazonaws.com/observability:01

          ports:
            - containerPort: 8000
