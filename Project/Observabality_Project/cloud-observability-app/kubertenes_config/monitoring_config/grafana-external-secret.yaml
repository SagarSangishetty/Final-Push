apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-secrets
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: monitoring-secrets      # one K8s Secret created with all keys inside
  data:
    - secretKey: admin-user
      remoteRef:
        key: prod/monitoring/grafana
        property: adminUser

    - secretKey: adminPassword
      remoteRef:
        key: prod/monitoring/grafana
        property: adminPassword

    - secretKey: slackWebhookUrl
      remoteRef:
        key: prod/monitoring/grafana
        property: slackWebhookUrl