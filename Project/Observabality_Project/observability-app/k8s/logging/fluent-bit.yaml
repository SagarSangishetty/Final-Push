apiVersion: v1
kind: ConfigMap

metadata:
  name: fluent-bit-config
  namespace: log

data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Log_Level    info

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            docker
        Tag               kube.*

    [OUTPUT]
        Name              es
        Match             *
        Host              elasticsearch
        Port              9200
        Index             kubernetes-logs

---
apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: fluent-bit
  namespace: log

spec:
  selector:
    matchLabels:
      app: fluent-bit

  template:
    metadata:
      labels:
        app: fluent-bit

    spec:
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:2.2

          volumeMounts:
            - name: varlog
              mountPath: /var/log

            - name: config
              mountPath: /fluent-bit/etc/

      volumes:
        - name: varlog
          hostPath:
            path: /var/log

        - name: config
          configMap:
            name: fluent-bit-config