apiVersion: apps/v1
kind: Deployment
metadata:
  name: urlshortener-backend
  namespace: urlshortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend-container
        image: shettysagar272/urlshortener:Backend-04

        resources:
          requests:
            memory: "128Mi"
            cpu: "200m"
          limits:
            memory: "256Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5   
          failureThreshold: 3 

        envFrom:
        - configMapRef:
            name: url-shortener-config-map

        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: url-shortener-secret
              key: DB_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: urlshortener-backend-service
  namespace: urlshortener

spec:
  type: ClusterIP

  selector:
    app: backend

  ports:
  - name: http
    port: 8000
    targetPort: 8000