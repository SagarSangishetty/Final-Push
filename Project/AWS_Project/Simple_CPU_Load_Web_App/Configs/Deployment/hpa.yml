apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-hpa
  namespace: cpu-load
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: application

  minReplicas: 2
  maxReplicas: 6

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70