apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: application-container
        image: 169976490560.dkr.ecr.ap-south-1.amazonaws.com/deom-eks-registery:01
        ports:
        - containerPort: 8080

        
 
---

apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  type: ClusterIP
  selector:
    app: demo-app
  ports:
  - name: http
    port: 80           # Service port inside cluster
    targetPort: 8080     # Container port
