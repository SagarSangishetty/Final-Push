apiVersion: apps/v1
kind: Deployment
metadata:
  # Unique key of the Deployment instance
  name: mongodb
spec:
  # 3 Pods should exist at all times.
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        # Apply this label to pods and default
        # the Deployment label selector to this value
        app: db
    spec:
      containers:
      - name: db-container
        # Run this image
        image: mongo:latest
        volumeMounts:
        - name: mongo-vol
          mountPath: /data/db
      volumes:
      - name: mongo-vol
        persistentVolumeClaim:
          claimName: mongo-pvc
---

kind: Service
apiVersion: v1
metadata:
  # Unique key of the Service instance
  name: db-service
spec:
  ports:
    # Accept traffic sent to port 27017
    - name: http
      port: 27017
      targetPort: 27017
  selector:
    # Loadbalance traffic across Pods matching
    # this label selector
    app: db
  # Create an HA proxy in the cloud provider
  # with an External IP address - *Only supported
  # by some cloud providers*