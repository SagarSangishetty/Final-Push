apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
      - name: app-container
        image: shettysagar272/k8s:db-demo-v3_multipe_pod_container
        env:
        - name: MONGO_HOST
          valueFrom:
            configMapKeyRef:
              name: mongo-config-map
              key: MONGO_HOST

        - name: MONGO_PORT
          valueFrom:
            configMapKeyRef:
              name: mongo-config-map
              key: MONGO_PORT
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  selector:
    app: app
  ports:
  - name: http
    port: 8080
    targetPort: 3000
  type: LoadBalancer