# fluentbit-values.yaml
image:
  tag: "3.2.2"    # use stable version instead of 5.0.6

## Enable HTTP server for liveness/readiness probes
config:
  service: |
    [SERVICE]
        Flush         1
        Daemon        Off
        Log_Level     info
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

  outputs: |
    [OUTPUT]
        Name            es
        Match           *
        Host            elasticsearch-master.logging.svc.cluster.local
        Port            9200
        HTTP_User       elastic
        HTTP_Passwd     iJewvJ2QCoDPhMRX
        Logstash_Format On
        Logstash_Prefix fluentbit
        Replace_Dots    On
        Retry_Limit     False
        tls             Off
        tls.verify      Off

tolerations:
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule